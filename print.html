<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Scheda Airbnb</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #222;
      background: #e8e8e8;
      padding: 24px 16px;
    }

    /* === CARD: proporzioni A4 (210 x 297mm) === */
    .card {
      display: flex;
      flex-direction: column;
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      border-radius: 8px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.15);
      overflow: hidden;
      font-size: 13px; /* base scalabile da A+/A- */
    }

    /* === HEADER === */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      background: #FF5A5F;
      color: #fff;
      padding: 32px 24px 20px;
      flex-shrink: 0;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    .card-header h1 {
      font-size: 1.46em;
      font-weight: 700;
      line-height: 1.35;
    }
    .price-badge {
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 8px;
      padding: 8px 16px;
      text-align: center;
      white-space: nowrap;
      flex-shrink: 0;
      print-color-adjust: exact;
      -webkit-print-color-adjust: exact;
    }
    .price-badge .price-value {
      font-size: 1.38em;
      font-weight: 700;
      display: block;
    }
    .price-badge .price-label {
      font-size: 0.77em;
      opacity: 0.8;
    }

    /* === FOTO: grande sinistra + 2 sovrapposte destra === */
    .photos {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: 140px 140px;
      gap: 3px;
      flex-shrink: 0;
      background: #ccc;
    }
    .photos img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photos img:first-child {
      grid-row: 1 / 3;
    }
    .photo-placeholder {
      background: #ddd;
      width: 100%;
      height: 100%;
    }

    /* === BODY === */
    .card-body {
      display: grid;
      grid-template-columns: 65fr 35fr;
      gap: 20px;
      padding: 20px 24px 30px;
      flex: 1;
    }
    .card-body .full-width {
      grid-column: 1 / -1;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.77em;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #FF5A5F;
      margin-bottom: 6px;
    }
    .section-label svg { flex-shrink: 0; }

    .overview-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .stat-chip {
      background: #f2f2f2;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 1.2em;
      color: #444;
    }

    .host-name {
      font-size: 1.2em;
      font-weight: 600;
    }

    .map-container {
      position: relative;
      width: 100%;
      height: 130px;
      border-radius: 6px;
      border: 1px solid #ddd;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .map-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }
    .location-text {
      font-size: 1.2em;
      color: #555;
      line-height: 1.6;
    }

    .description-text {
      font-size: 1.2em;
      color: #444;
      line-height: 1.65;
    }

    /* === HEADER META (città, stelle, recensioni) === */
    .header-left { flex: 1; }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .city-tag {
      font-size: 0.85em;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 12px;
      padding: 2px 8px;
    }
    .stars {
      font-size: 0.92em;
      font-weight: 700;
    }
    .reviews-count {
      font-size: 0.85em;
      opacity: 0.85;
    }

    /* === DATE PRENOTAZIONE === */
    .dates-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 6px;
    }
    .date-block { text-align: center; }
    .date-label {
      font-size: 0.77em;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #aaa;
      margin-bottom: 2px;
    }
    .date-value {
      font-size: 1.54em;
      font-weight: 700;
      color: #222;
      letter-spacing: 0.02em;
    }
    .date-arrow { font-size: 1.69em; color: #ddd; line-height: 1; }
    .date-nights {
      margin-left: 8px;
      display: flex;
      align-items: baseline;
      gap: 4px;
    }
    .nights-num {
      font-size: 2.8em;
      font-weight: 800;
      color: #FF5A5F;
      line-height: 1;
    }
    .nights-word {
      font-size: 1em;
      font-weight: 600;
      color: #FF5A5F;
    }

    /* === DIVIDER === */
    .divider {
      grid-column: 1 / -1;
      height: 1px;
      background: #eee;
      margin: 2px 0;
    }

    /* === FOOTER === */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      border-top: 1px solid #eee;
      background: #fafafa;
      flex-shrink: 0;
    }
    .url-text {
      font-size: 0.77em;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .signature {
      font-size: 0.77em;
      color: #bbb;
      white-space: nowrap;
      flex-shrink: 0;
      margin: 0 12px;
    }
    .print-btn {
      background: #FF5A5F;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }
    .print-btn:hover { background: #e04a50; }

    /* === TOOLBAR A+/A- === */
    .toolbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .toolbar-btn {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #444;
      line-height: 1;
    }
    .toolbar-btn:hover { background: #f5f5f5; border-color: #999; }

    /* Segmented control stampa */
    .print-mode {
      display: flex;
      border: 1px solid #ccc;
      border-radius: 6px;
      overflow: hidden;
      margin-left: 12px;
    }
    .print-mode button {
      background: #fff;
      border: none;
      border-right: 1px solid #ccc;
      padding: 5px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      color: #888;
      line-height: 1;
    }
    .print-mode button:last-child { border-right: none; }
    .print-mode button.active {
      background: #FF5A5F;
      color: #fff;
    }
    .print-mode button:not(.active):hover { background: #f5f5f5; color: #444; }
    .toolbar-label {
      font-size: 12px;
      color: #888;
      min-width: 60px;
      text-align: center;
    }

    /* === STAMPA A4 === */
    @page {
      size: A4 portrait;
      margin: 0;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .card {
        box-shadow: none;
        border-radius: 0;
        width: 210mm;
        min-height: 297mm;
      }
      .print-btn { display: none; }
      .card-footer { background: #fff; }
      /* Ink-saving: attivo solo senza classe color-print */
      body:not(.color-print) .card-header {
        background: #fff;
        color: #000;
        border-bottom: 2px solid #000;
      }
      body:not(.color-print) .card-header h1 { color: #000; }
      body:not(.color-print) .header-meta .city-tag {
        background: none;
        border-color: #555;
        color: #555;
      }
      body:not(.color-print) .header-meta .stars,
      body:not(.color-print) .header-meta .reviews-count { color: #000; opacity: 1; }
      body:not(.color-print) .price-badge {
        background: #fff;
        border: 1.5px solid #000;
        color: #000;
      }
      body:not(.color-print) .price-badge .price-value,
      body:not(.color-print) .price-badge .price-label { color: #000; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="toolbar" id="toolbar">
    <button class="toolbar-btn" id="zoomOut">A−</button>
    <span class="toolbar-label" id="zoomLabel">13px</span>
    <button class="toolbar-btn" id="zoomIn">A+</button>
    <div class="print-mode" id="printMode">
      <button id="modeBW" class="active">B/N</button>
      <button id="modeColor">Colori</button>
    </div>
    <button class="toolbar-btn" id="printBtnTop" style="background:#FF5A5F;color:#fff;border-color:#FF5A5F;margin-left:8px;">Stampa / Salva PDF</button>
  </div>

  <div class="card" id="card">
    <p style="padding:24px;color:#aaa">Caricamento in corso...</p>
  </div>
  <script src="print.js"></script>
</body>
</html>
